<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Proof of Funds — Stellar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 560px;
      margin: 64px auto;
      padding: 0 24px;
      color: #1a1a1a;
    }
    h1 { font-size: 22px; margin-bottom: 4px; }
    p.sub { color: #666; margin-top: 0; }
    label { display: block; font-size: 13px; color: #444; margin: 16px 0 4px; }
    input {
      width: 100%;
      padding: 10px 12px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }
    button {
      margin-top: 20px;
      padding: 10px 18px;
      font-size: 15px;
      background: #111;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:disabled { background: #999; cursor: default; }
    #result {
      margin-top: 24px;
      padding: 14px 16px;
      border-radius: 6px;
      font-size: 14px;
      display: none;
      white-space: pre-wrap;
    }
    #result.pass { background: #e8f7ee; color: #14532d; display: block; }
    #result.fail { background: #fdeeee; color: #7a1f1f; display: block; }
    #result.pending { background: #f0f0f0; color: #444; display: block; }
    a { color: #111; }
  </style>
</head>
<body>
  <h1>Proof of Funds</h1>
  <p class="sub">Prove a balance meets a threshold — on Stellar testnet — without revealing the balance.</p>

  <form id="form">
    <label for="balance">Balance (private — never sent to the chain)</label>
    <input id="balance" type="number" min="0" required placeholder="e.g. 5000" />

    <label for="threshold">Threshold (public)</label>
    <input id="threshold" type="number" min="0" required placeholder="e.g. 1000" />

    <button id="submit" type="submit">Generate proof &amp; verify on-chain</button>
  </form>

  <div id="result"></div>

  <script src="app.js"></script>
</body>
</html>
